# ─────────────────────────────────────────────
# EVENTS: Konfigurasi performa koneksi
# ─────────────────────────────────────────────
events {
    worker_connections 1024;
    # epoll otomatis digunakan oleh Nginx di Linux, tidak perlu set manual
}

http {

    # ── [UPGRADE 1] Sembunyikan Identitas Server ──────────────────
    # Tanpa ini, header "Server: nginx/1.24.0" keliatan di response.
    # Attacker bisa langsung googling exploit untuk versi tersebut.
    server_tokens off;

    # ── [UPGRADE 2] Bad Bot Fingerprinting ───────────────────────
    # Deteksi tool hacking dari User-Agent SEBELUM request masuk ke
    # honeypot. Ini layer pertama sebelum Python Analyzer.
    # Kalau User-Agent mengandung kata-kata ini → $is_hacking_tool = 1
    map $http_user_agent $is_hacking_tool {
        default         0;
        ~*sqlmap        1;   # SQL injection scanner
        ~*nikto         1;   # Web vulnerability scanner
        ~*nmap          1;   # Port scanner
        ~*masscan       1;   # Port scanner cepat
        ~*zgrab         1;   # Banner grabber
        ~*nuclei        1;   # Vulnerability scanner
        ~*dirbuster     1;   # Directory brute force
        ~*gobuster      1;   # Directory brute force
    }

    # ── [UPGRADE 3] Rate Limiting Zone ───────────────────────────
    # Bikin "zona" rate limit khusus untuk honeypot.
    # Artinya: satu IP maksimal 5 request/detik ke endpoint honeypot.
    # Kalau lebih → Nginx throttle otomatis, server tidak kewalahan
    # meski diserang ribuan request per detik.
    limit_req_zone $binary_remote_addr zone=honeypot:10m rate=5r/s;

    # ── Format Log JSON ──────────────────────────────────────────
    # Format ini yang dibaca Python Analyzer.
    # Tambahan field: "tool" untuk hasil deteksi bad bot di atas.
    log_format json_threat escape=json
        '{'
            '"time":"$time_iso8601",'
            '"ip":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"ua":"$http_user_agent",'
            '"tool":$is_hacking_tool'
        '}';

    # ── [UPGRADE 4] Security Headers ─────────────────────────────
    # Header HTTP extra yang dikirim ke browser/client.
    # Penjelasan tiap header ada di bawah.
    add_header X-Frame-Options "SAMEORIGIN" always;
    # ↑ Cegah halaman lo di-embed di iframe orang lain (clickjacking)

    add_header X-Content-Type-Options "nosniff" always;
    # ↑ Cegah browser "menebak" tipe file — kalau attacker upload file
    #   .txt yang isinya JavaScript, browser tidak akan eksekusi sebagai JS

    add_header X-XSS-Protection "1; mode=block" always;
    # ↑ Aktifkan filter XSS bawaan browser lama (Chrome/Safari lama)

    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # ↑ Kontrol informasi Referer yang dikirim — biar URL internal
    #   server lo tidak bocor ke situs luar

    server {
        listen 80;

        # ── Honeypot: Tangkap Rute yang Diincar Peretas ──────────
        location ~* ^/(\.env|\.git|wp-admin|wp-login\.php|admin|phpMyAdmin) {

            # [UPGRADE 3 applied] Rate limit di sini
            # burst=10: toleransi lonjakan 10 request sekaligus
            # nodelay: langsung proses tanpa tunda, tapi tetap hitung kuota
            limit_req zone=honeypot burst=10 nodelay;
            limit_req_status 429;

            # [MITIGASI 1] buffer=off:
            # Log langsung ditulis ke disk tanpa nunggu buffer penuh.
            # Ini mencegah Python baca log yang belum selesai ditulis Nginx.
            access_log /var/log/nginx/shared/threat_alert.log json_threat buffer=off flush=1s;

            return 403;
        }

        # ── Rute Normal ──────────────────────────────────────────
        location / {
            access_log off;
            return 200 "OK";
        }

        # ── Blokir Akses ke File Tersembunyi ─────────────────────
        # Selain honeypot di atas, ini blokir semua file/folder
        # yang diawali titik (.htaccess, .DS_Store, dll)
        location ~ /\. {
            deny all;
        }
    }
}